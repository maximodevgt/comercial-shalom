{% extends 'base.html' %}

{% block titulo %}Eliminar cliente{% endblock %}

{% block contenido %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white"><i class="fa-solid fa-triangle-exclamation me-1"></i> Confirmar eliminación</div>
            <div class="card-body">
                <p>¿Seguro que querés eliminar al cliente <strong>{{ objeto.nombre }}</strong>?</p>
                <p class="text-muted small">No se podrá eliminar si tiene ventas o apartados asociados.</p>
                <form method="post" class="d-flex gap-2">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger"><i class="fa-solid fa-trash me-1"></i>Sí, eliminar</button>
                    <a href="{% url 'clientes:detalle' objeto.pk %}" class="btn btn-secondary">
                        <i class="fa-solid fa-arrow-left me-1"></i>Volver</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
