{% extends 'base.html' %}
{% block titulo %}Cierre diario{% endblock %}

{% block contenido %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h3 mb-0"><i class="fa-solid fa-cash-register"></i> Cierre diario — {{ fecha|date:'d/m/Y' }}
        {% if solo_propias %}<span class="badge bg-secondary align-middle">Solo mis ventas</span>{% endif %}

    <a href="{% url 'reportes:cierre_pdf' %}" class="btn btn-danger"><i class="fa-solid fa-file-pdf"></i> Descargar PDF</a>
</div>
{% include 'reportes/_resumen.html' %}
{% endblock %}
