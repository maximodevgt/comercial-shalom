{% extends 'base.html' %}
{% block titulo %}Reporte por fecha{% endblock %}

{% block contenido %}
<h1 class="h3 mb-3"><i class="fa-solid fa-calendar-days"></i> Reporte por fecha</h1>

<form method="get" class="row g-2 mb-4 align-items-end">
    <div class="col-auto">
        <label class="form-label small mb-0">Fecha</label>
        <input type="date" name="fecha" value="{{ fecha_str }}" class="form-control">
    </div>
    <div class="col-auto"><button class="btn btn-primary"><i class="fa-solid fa-magnifying-glass"></i> Ver</button></div>
    <div class="col-auto"><a href="{% url 'reportes:reporte_pdf' %}?fecha={{ fecha_str }}" class="btn btn-danger"><i class="fa-solid fa-file-pdf"></i> PDF</a></div>
</form>

<h2 class="h5 text-muted mb-3">Resultados del {{ fecha|date:'d/m/Y' }}</h2>
{% include 'reportes/_resumen.html' %}
{% endblock %}
